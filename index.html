/* ─── RECURRING ─── */
function processRecurring(txs) {
  let newTxs = [...txs];
  const now = new Date();
  const currY = now.getFullYear(), currM = now.getMonth()+1;
  const recMap = {};
  newTxs.forEach(t => {
    if(t.is_recurring && t.recurring_id) {
      if(!recMap[t.recurring_id] || new Date(t.date) > new Date(recMap[t.recurring_id].date))
        recMap[t.recurring_id] = t;
    }
  });
  Object.values(recMap).forEach(latest => {
    let d = new Date(latest.date);
    let y = d.getFullYear(), m = d.getMonth()+1;
    while(y < currY || (y===currY && m < currM)) {
      m++; if(m>12){m=1;y++;}
      const daysInMonth = new Date(y,m,0).getDate();
      const validDay = Math.min(d.getDate(),daysInMonth);
      const nextDate = `${y}-${String(m).padStart(2,'0')}-${String(validDay).padStart(2,'0')}`;
      newTxs.push({...latest, id:'rec_'+generateId(), date:nextDate});
    }
  });
  return newTxs;
}

/* ─── UTILS ─── */
function monthStats(txs,y,m) {
  const list = txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&(d.getMonth()+1)===m;});
  const income = list.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense = list.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  return {income,expense,balance:income-expense,list};
}
function catBreakdown(txs,y,m,categories=[]) {
  const {list} = monthStats(txs,y,m);
  const expenses = list.filter(t=>t.type==="expense");
  const total = expenses.reduce((s,t)=>s+t.amount,0);
  const map = {};
  expenses.forEach(t=>{map[t.category]=(map[t.category]||0)+t.amount;});
  return Object.entries(map).map(([id,amt])=>({...getCat(id,categories),amount:amt,pct:total?(amt/total)*100:0})).sort((a,b)=>b.amount-a.amount);
}

/* ─── DONUT CHART ─── */
function DonutChart({slices,size=180,thickness=32,label,sublabel}) {
  const r=(size-thickness)/2,circ=2*Math.PI*r;
  let offset=0;
  const paths=slices.filter(s=>s.pct>0).map((s,i)=>{
    const len=(s.pct/100)*circ,gap=slices.length>1?2:0,o=offset;
    offset+=len;
    return{...s,len:Math.max(len-gap,0),dashoffset:circ-o,key:i};
  });
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.border} strokeWidth={thickness}/>
        {paths.map(p=>(
          <circle key={p.key} cx={size/2} cy={size/2} r={r} fill="none" stroke={p.color} strokeWidth={thickness}
            strokeDasharray={`${p.len} ${circ}`} strokeDashoffset={p.dashoffset} style={{transition:"stroke-dasharray .6s ease"}}/>
        ))}
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",pointerEvents:"none",padding:thickness}}>
        <div style={{fontSize:size>150?15:13,fontWeight:800,lineHeight:1.1,wordBreak:"break-all"}}>{label}</div>
        {sublabel&&<div style={{fontSize:10,color:G.sub,marginTop:3}}>{sublabel}</div>}
      </div>
    </div>
  );
}

function TrendBadge({current,prev,inverse=false}) {
  if(prev===0&&current===0) return null;
  if(prev===0&&current>0) return <div style={{fontSize:10,color:G.sub,marginTop:2,fontWeight:600}}>+100% vs mese prec.</div>;
  if(!prev) return <div style={{fontSize:10,color:G.sub,marginTop:2}}>Nessun dato prec.</div>;
  const pct=((current-prev)/prev)*100;
  const isUp=pct>0,isNeutral=pct===0;
  const color=isNeutral?G.sub:(inverse?(isUp?G.red:G.green):(isUp?G.green:G.red));
  const arrow=isNeutral?"=":(isUp?"↑":"↓");
  return <div style={{fontSize:10,color,fontWeight:600,marginTop:2}}>{arrow} {Math.abs(pct).toFixed(1)}% vs mese prec.</div>;
}

  const submit=()=>{
    const newErrors={};
    const n=parseFloat(amount.trim().replace(",","."));
    if(!amount.trim()||isNaN(n)||n<=0) newErrors.amount="Inserisci un importo valido (es. 12,50)";
    if(!cat) newErrors.cat="Seleziona una categoria";
    if(Object.keys(newErrors).length){setErrors(newErrors);return;}
    setErrors({});
    const txData={type,amount:n,date,description:desc,category:cat,is_recurring:isRecurring};
    if(isRecurring&&!initial?.recurring_id) txData.recurring_id='rec_'+generateId();
    else if(isRecurring&&initial?.recurring_id) txData.recurring_id=initial.recurring_id;
    onSave(txData);

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:18}}>{initial?"Modifica":"Nuova transazione"}</div>

        </div>
        <div style={{display:"flex",background:G.bg,borderRadius:12,padding:3,marginBottom:16}}>
          {["expense","income"].map(t=>(
            <button key={t} onClick={()=>setType(t)} style={{flex:1,padding:10,border:"none",borderRadius:10,fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:14,cursor:"pointer",background:type===t?(t==="income"?G.green:G.red):"transparent",color:type===t?"#FFF":G.sub,transition:"all .15s"}}>
              {t==="income"?"💰 Entrata":"💸 Uscita"}
            </button>
          ))}
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:G.sub,fontWeight:600,display:"block",marginBottom:6}}>IMPORTO (€)</label>
          <input style={{...inp,fontSize:28,fontWeight:800,textAlign:"center",color:errors.amount?G.red:(type==="income"?G.green:G.red),border:errors.amount?`1.5px solid ${G.red}`:`1px solid ${G.border}`}} type="text" inputMode="decimal" placeholder="0,00" value={amount} onChange={e=>{setAmt(e.target.value);if(errors.amount)setErrors(p=>({...p,amount:null}));}}/>
          {errors.amount&&<div style={{color:G.red,fontSize:12,marginTop:6,fontWeight:600}}>⚠ {errors.amount}</div>}
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:G.sub,fontWeight:600,display:"block",marginBottom:6}}>DATA</label>
          <input style={inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,color:G.sub,fontWeight:600,display:"block",marginBottom:6}}>DESCRIZIONE (opz.)</label>
          <input style={inp} type="text" placeholder="es. Supermercato" value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:12,color:G.sub,fontWeight:600,display:"block",marginBottom:8}}>CATEGORIA</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {cats.map(c=>{
              const isSel=cat===c.id,sc=type==="income"?G.green:G.red;
              return (<button key={c.id} onClick={()=>{setCat(c.id);setErrors(p=>({...p,cat:null}));}} style={{background:isSel?sc+"33":G.bg,border:`1.5px solid ${isSel?sc:G.border}`,borderRadius:20,padding:"7px 13px",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:600,color:isSel?sc:G.sub,cursor:"pointer",display:"flex",alignItems:"center",gap:4,transition:"all .15s"}}>{c.emoji} {c.label}</button>);
            })}
          </div>
          {errors.cat&&<div style={{color:G.red,fontSize:12,marginTop:8,fontWeight:600}}>⚠ {errors.cat}</div>}
        </div>
        <div style={{marginBottom:22,display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setIsRecurring(!isRecurring)} style={{width:24,height:24,borderRadius:6,border:`2px solid ${isRecurring?G.accent:G.border}`,background:isRecurring?G.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#FFF",fontSize:14}}>
            {isRecurring?"✓":""}
          </button>
          <span style={{fontSize:14,fontWeight:600,color:isRecurring?G.text:G.sub}}>Ripeti ogni mese in questa data</span>
        </div>
        {initial&&(
          <button onClick={()=>{onDelete(initial.id);onClose();}} style={{padding:"14px",borderRadius:12,border:`1px solid ${G.red}66`,background:`${G.red}11`,fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",color:G.red,width:"100%",marginBottom:10}}>
            🗑 Elimina Transazione
          </button>
        )}
        <button onClick={submit} style={{padding:"14px",borderRadius:12,border:"none",fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",background:G.accent,color:"#FFF",width:"100%"}}>✓ Salva</button>
      </div>
    </div>
  );
}

function MonthScreen({txs,onDelete,onEdit,categories}) {

  const cats=useMemo(()=>catBreakdown(txs,year,month,categories),[txs,year,month,categories]);
  useEffect(()=>setActiveFilter(null),[year,month]);
  const filteredList=useMemo(()=>stats.list.filter(tx=>{
    const term=search.toLowerCase(),c=getCat(tx.category,categories);
    return(tx.description?.toLowerCase().includes(term)||c.label.toLowerCase().includes(term))&&(activeFilter?tx.category===activeFilter:true);
  }),[stats.list,search,activeFilter,categories]);

    <div style={{paddingBottom:100,overflowY:"auto",WebkitOverflowScrolling:"touch",height:"100%"}} className="hide-sb">

/* ─── ANNO ─── */
function YearScreen({txs}) {
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const rows=useMemo(()=>Array.from({length:12},(_,i)=>{const s=monthStats(txs,year,i+1);return{m:i+1,...s,empty:s.list.length===0,isNow:year===now.getFullYear()&&(i+1)===now.getMonth()+1};}),[txs,year]);
  const totInc=useMemo(()=>rows.reduce((s,r)=>s+r.income,0),[rows]);
  const totExp=useMemo(()=>rows.reduce((s,r)=>s+r.expense,0),[rows]);
  const totBal=totInc-totExp;
  const annualT=totInc+totExp;
  const annualDonut=annualT>0?[{color:G.green,pct:(totInc/annualT)*100},{color:G.red,pct:(totExp/annualT)*100}]:[{color:G.muted,pct:100}];
  return (
    <div style={{paddingBottom:100,overflowY:"auto",WebkitOverflowScrolling:"touch",height:"100%"}} className="hide-sb">
      <div style={{padding:"20px 20px 0"}}>
        <YearSelector year={year} onChange={setYear}/>
        <div style={{background:G.card,borderRadius:16,border:`1px solid ${G.border}`,padding:"16px",marginBottom:14,display:"flex",gap:14,alignItems:"center"}}>
          <DonutChart slices={annualDonut} size={120} thickness={22} label={fmtShort(totBal)} sublabel="saldo annuo"/>
          <div style={{flex:1}}>
            {[["Entrate",G.green,"+"+fmtShort(totInc)],["Uscite",G.red,"-"+fmtShort(totExp)],["Saldo",totBal>=0?G.green:G.red,(totBal>=0?"+":"")+fmtShort(totBal)]].map(([l,c,v])=>(
              <div key={l} style={{marginBottom:8}}><div style={{fontSize:10,color:G.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{l}</div><div style={{color:c,fontSize:17,fontWeight:800}}>{v}</div></div>
            ))}
          </div>
        </div>
        <div style={{background:G.card,borderRadius:16,border:`1px solid ${G.border}`,padding:"16px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:G.sub,letterSpacing:.5,textTransform:"uppercase",marginBottom:12}}>Andamento Mensile</div>
          <BarChart rows={rows}/>
        </div>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{fontSize:11,fontWeight:700,color:G.sub,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>Riepilogo Mese per Mese</div>
        {rows.map(r=>(
          <div key={r.m} style={{background:G.card,borderRadius:14,border:`1px solid ${r.isNow?G.accent:G.border}`,padding:"11px 14px",marginBottom:7,opacity:r.empty?.38:1}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <div style={{flex:2,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>{MONTHS_SHORT[r.m-1]}{r.isNow&&<span style={{fontSize:8,fontWeight:700,color:"#FFF",background:G.accent,borderRadius:20,padding:"2px 6px"}}>ora</span>}</div>
              <div style={{flex:2,color:G.green,fontSize:12,fontWeight:600,textAlign:"right"}}>{r.income>0?"+"+fmtShort(r.income):"-"}</div>
              <div style={{flex:2,color:G.red,fontSize:12,fontWeight:600,textAlign:"right"}}>{r.expense>0?"-"+fmtShort(r.expense):"-"}</div>
              <div style={{flex:2,color:r.balance>0?G.green:r.balance<0?G.red:G.sub,fontWeight:800,fontSize:13,textAlign:"right"}}>{r.empty?"-":(r.balance>=0?"+":"")+fmtShort(r.balance)}</div>
            </div>
            {!r.empty&&<div style={{marginTop:8,height:3,background:G.border,borderRadius:3,overflow:"hidden"}}><div style={{height:3,borderRadius:3,width:"100%",background:`linear-gradient(90deg,${G.green} ${(r.income/(r.income+r.expense||1))*100}%,${G.red} 0)`}}/></div>}
          </div>
        ))}
      </div>
    </div>
  );
}

  const exportData=()=>{
    const data={txs,settings:{bank,budget,categories}};

    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`fintrack_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();

      <div style={{background:G.card,borderRadius:16,border:`1px solid ${G.border}`,padding:"16px",marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Backup Dati</div>
        <button onClick={exportData} style={{width:"100%",padding:"12px",borderRadius:10,border:`1px solid ${G.accent}`,background:G.accent+"11",color:G.accent,cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          📥 Esporta JSON
        </button>
      </div>
      <div style={{background:G.card,borderRadius:16,border:`1px solid ${G.border}`,padding:"16px",marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Budget Mensile (€)</div>
        <input style={{...inp,fontSize:20,fontWeight:800}} type="text" inputMode="decimal" value={budget} onChange={e=>setBudget(parseFloat(e.target.value)||0)}/>
      </div>
      <div style={{background:editingId?G.surface:G.card,borderRadius:16,border:`1px solid ${editingId?G.accent:G.border}`,padding:"16px",marginBottom:20,transition:"all 0.3s"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{editingId?"✏️ Modifica Categoria":"Aggiungi Nuova Categoria"}</div>
        <div style={{display:"flex",background:G.bg,borderRadius:12,padding:3,marginBottom:12}}>
          {["expense","income"].map(t=>(<button key={t} onClick={()=>setNewCat({...newCat,type:t})} style={{flex:1,padding:8,border:"none",borderRadius:10,fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer",background:newCat.type===t?(t==="income"?G.green:G.red):"transparent",color:newCat.type===t?"#FFF":G.sub,transition:"all .15s"}}>{t==="income"?"Entrata":"Uscita"}</button>))}
        </div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <input style={{...inp,flex:1,fontSize:18,textAlign:"center"}} value={newCat.emoji} onChange={e=>setNewCat({...newCat,emoji:e.target.value})} placeholder="Emoji"/>
          <input style={{...inp,flex:4}} value={newCat.label} onChange={e=>setNewCat({...newCat,label:e.target.value})} placeholder="Nome (es. Palestra)"/>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
          {PRESET_COLORS.map(c=>(<div key={c} onClick={()=>setNewCat({...newCat,color:c})} style={{width:26,height:26,borderRadius:13,background:c,cursor:"pointer",border:`2px solid ${newCat.color===c?"#FFF":"transparent"}`}}/>))}
        </div>
        <div style={{display:"flex",gap:10}}>
          {editingId&&<button onClick={()=>{setNewCat(def);setEditingId(null);}} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${G.border}`,background:"transparent",color:G.text,cursor:"pointer",fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700}}>Annulla</button>}
          <button onClick={saveCategory} disabled={!newCat.label} style={{flex:editingId?2:1,padding:"12px",borderRadius:10,border:"none",fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,cursor:newCat.label?"pointer":"not-allowed",background:newCat.label?G.accent:G.muted,color:newCat.label?"#FFF":G.sub,width:"100%"}}>
            {editingId?"Salva Modifiche":"+ Crea Categoria"}
          </button>
        </div>
      </div>
      {categories.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:G.sub,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>Le tue Categorie</div>
          {categories.map(c=>(
            <div key={c.id} style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:8,background:c.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{c.emoji}</div>
                <div><div style={{fontWeight:600,fontSize:14}}>{c.label}</div><div style={{fontSize:11,color:c.type==="income"?G.green:G.red,fontWeight:600}}>{c.type==="income"?"Entrata":"Uscita"}</div></div>
              </div>
              <div style={{display:"flex",gap:14,alignItems:"center"}}>
                <button onClick={()=>{setNewCat({type:c.type,label:c.label,emoji:c.emoji,color:c.color});setEditingId(c.id);}} style={{background:"none",border:"none",color:G.sub,cursor:"pointer",padding:2,fontSize:16}}>✏️</button>
                <button onClick={()=>setCategories(categories.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",color:G.red,cursor:"pointer",padding:2,fontSize:16}}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
      <button onClick={onLogout} style={{width:"100%",padding:"14px",borderRadius:12,border:`1px solid ${G.red}66`,background:`${G.red}11`,fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",color:G.red}}>
        🚪 Esci dall'account
      </button>
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [txs, setTxs] = useState([]);
  const [bank, setBank] = useState(0);
  const [budget, setBudget] = useState(1500);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [tab, setTab] = useState("home");
  const [form, setForm] = useState(null);
  const [bankModal, setBankModal] = useState(false);
  const [saving, setSaving] = useState(false);

  /* ─── AUTH ─── */
  useEffect(() => {
    supabase.auth.getSession().then(({data:{session}}) => {
      setSession(session);
      setAuthLoading(false);
    });
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_event,session) => {
      setSession(session);
      setAuthLoading(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  /* ─── LOAD DATA ─── */
  useEffect(() => {
    if (!session) return;
    const uid = session.user.id;

    // Load settings
    supabase.from('settings').select('*').eq('user_id',uid).single().then(({data,error}) => {
      if (data) {
        setBank(data.bank||0);
        setBudget(data.budget||1500);
        setCategories(data.categories?.length>0 ? data.categories : DEFAULT_CATEGORIES);
      } else {
        // First time: create settings row
        supabase.from('settings').insert({user_id:uid,bank:0,budget:1500,categories:DEFAULT_CATEGORIES});
      }
    });

    // Load transactions
    supabase.from('transactions').select('*').eq('user_id',uid).then(({data}) => {
      if (data) setTxs(processRecurring(data));
    });
  }, [session]);

  /* ─── SAVE SETTINGS ─── */
  const saveSettings = useCallback(async (updates) => {
    if (!session) return;
    await supabase.from('settings').upsert({user_id:session.user.id,...updates});
  }, [session]);

  /* ─── TX OPERATIONS ─── */
  const addTx = useCallback(async (data) => {
    if (!session) return;
    const id = (form && form !== "new") ? form.id : generateId();
    const row = {...data, id, user_id:session.user.id};
    const {error} = await supabase.from('transactions').upsert(row);
    if (!error) {
      setTxs(prev => processRecurring([...prev.filter(t=>t.id!==id), row]));
    }
    setForm(null);
  }, [form, session]);

  const delTx = useCallback(async (id) => {
    if (!session) return;
    await supabase.from('transactions').delete().eq('id',id).eq('user_id',session.user.id);
    setTxs(prev => prev.filter(t=>t.id!==id));
  }, [session]);

  const handleSetBank = (v) => { setBank(v); saveSettings({bank:v}); setBankModal(false); };
  const handleSetBudget = (v) => { setBudget(v); saveSettings({budget:v}); };
  const handleSetCategories = (c) => { setCategories(c); saveSettings({categories:c}); };
  const handleLogout = () => supabase.auth.signOut();

  const TABS = [
    {id:"home",label:"Home",icon:"🏠"},
    {id:"month",label:"Mese",icon:"📅"},
    {id:"year",label:"Anno",icon:"📊"},
    {id:"settings",label:"Imposta",icon:"⚙️"},
  ];

  if (authLoading) return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontWeight:800,fontSize:32,letterSpacing:-1}}><span style={{color:G.accent}}>fin</span><span style={{color:G.text}}>track</span></div>
        <div style={{color:G.sub,fontSize:13,marginTop:8}}>Caricamento...</div>
      </div>
    </div>
  );

  if (!session) return <LoginScreen/>;

  return (
    <>
      <div style={{fontFamily:"'Sora',sans-serif",background:G.bg,color:G.text,height:"100dvh",maxWidth:480,margin:"0 auto",position:"relative",overflowX:"hidden",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 20px 12px",borderBottom:`1px solid ${G.border}`,background:G.bg,flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:800,fontSize:20,letterSpacing:-.5}}><span style={{color:G.accent}}>fin</span><span style={{color:G.text}}>track</span></div>
            <div style={{fontSize:10,background:"#4ADE8022",color:G.green,padding:"4px 8px",borderRadius:20,fontWeight:700}}>☁️ Cloud Sync</div>
          </div>
        </div>

        <div style={{flex:1,overflow:"hidden",position:"relative",minHeight:0}}>
          {tab==="home"&&<HomeScreen txs={txs} bank={bank} budget={budget} onAdd={()=>setForm("new")} onEditBank={()=>setBankModal(true)} categories={categories}/>}
          {tab==="month"&&<MonthScreen txs={txs} onDelete={delTx} onEdit={setForm} categories={categories}/>}
          {tab==="year"&&<YearScreen txs={txs}/>}
          {tab==="settings"&&<SettingsScreen budget={budget} setBudget={handleSetBudget} categories={categories} setCategories={handleSetCategories} txs={txs} bank={bank} onLogout={handleLogout}/>}
        </div>

        <button className="fab" onClick={()=>setForm("new")} style={{position:"fixed",bottom:80,right:20,zIndex:90,width:56,height:56,borderRadius:28,background:G.accent,color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 16px rgba(96,165,250,0.4)",border:"none",cursor:"pointer",fontSize:28,transition:"transform 0.15s ease"}}>+</button>

        <nav style={{borderTop:`1px solid ${G.border}`,background:G.surface,display:"flex",height:64,flexShrink:0}}>
          {TABS.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,border:"none",background:"none",color:tab===id?G.accent:G.sub,cursor:"pointer",fontSize:10,fontFamily:"'Sora',sans-serif",fontWeight:tab===id?600:400,transition:"color .2s"}}>
              <span style={{fontSize:20}}>{icon}</span>
              <span>{label}</span>
            </button>
          ))}
        </nav>
      </div>

      {form!==null&&<TxForm initial={form==="new"?null:form} onSave={addTx} onDelete={delTx} onClose={()=>setForm(null)} categories={categories}/>}
      {bankModal&&<BankModal current={bank} onSave={handleSetBank} onClose={()=>setBankModal(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
